const fmt=(v)=>new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0);
const today=()=>new Date().toISOString().split('T')[0];
const getMonthKey=()=>{const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;};
const parseMonth=(ym)=>{if(!ym)return'';const[y,m]=ym.split('-');return`${MONTHS_PT[parseInt(m)-1]} ${y}`;};
const shiftMonth=(ym,n)=>{const[y,m]=ym.split('-').map(Number);const d=new Date(y,m-1+n,1);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;};
const fmtDate=(d)=>{if(!d)return'—';const[,m,dd]=d.split('-');return`${dd}/${m}`;};
const dateToMonth=(d)=>{if(!d)return getMonthKey();const[y,m]=d.split('-');return`${y}-${m}`;};
const uid=()=>`${Date.now().toString(36)}${Math.random().toString(36).slice(2)}`;
const netAmt=(e)=>e.amount-(e.reembolso||0);
const resolveW=(ws,id)=>ws.find(w=>w.id===id)||{id,label:id,short:id.slice(0,8),color:'#555',isCredit:false,closingDay:0};
const greet=()=>{const h=new Date().getHours();return h<12?'Bom dia':h<18?'Boa tarde':'Boa noite';};
function computeTargetMonth(dateStr,wallet,payType){
  if(!dateStr)return getMonthKey();
  const[y,m,d]=dateStr.split('-').map(Number);
  const base=`${y}-${String(m).padStart(2,'0')}`;
  if(payType!=='credit'&&payType!=='credit_inst')return base;
  if(!wallet?.isCredit||!wallet?.closingDay)return base;
  if(d>wallet.closingDay){const nd=new Date(y,m,1);return`${nd.getFullYear()}-${String(nd.getMonth()+1).padStart(2,'0')}`;}
  return base;
}

function buildWA(user,expenses,incomes,month,wallets){
  const total=expenses.reduce((s,e)=>s+netAmt(e),0),recs=incomes.reduce((s,i)=>s+i.amount,0);
  let t=`📊 *RELATÓRIO ${parseMonth(month).toUpperCase()}*\n👤 ${user==='gabriel'?'Gabriel':'Mariana'}\n\n`;
  t+=`💰 Receitas: *${fmt(recs)}*\n💸 Gastos: *${fmt(total)}*\n📈 Saldo: *${fmt(recs-total)}*\n─────────────────\n`;
  [...new Set(expenses.map(e=>e.wallet))].forEach(wid=>{
    const w=resolveW(wallets,wid),we=expenses.filter(e=>e.wallet===wid);
    t+=`\n*${w.label}* — ${fmt(we.reduce((s,e)=>s+netAmt(e),0))}\n`;
    we.sort((a,b)=>a.description.localeCompare(b.description)).forEach(e=>{t+=`• ${e.description}: ${fmt(netAmt(e))}${e.reembolso?` _(reimb. ${fmt(e.reembolso)})_`:''}\n`;});
  });
  const pix=expenses.filter(e=>e.paymentType==='pix_future');
  if(pix.length){t+=`\n*📅 PIX Agendados*\n`;pix.forEach(e=>{t+=`• ${e.description}: ${fmt(e.amount)} (${fmtDate(e.dueDate)})\n`;});}
  if(incomes.length){t+=`\n*💰 Receitas*\n`;incomes.forEach(i=>{t+=`• ${i.description}: ${fmt(i.amount)}\n`;});}
  return t;
}

  useEffect(()=>{if(wallets.length&&!wallets.find(w=>w.id===walletId)){const f=wallets[0];setWalletId(f.id);setPayType(f.isCredit?'credit':'pix_now');}},[wallets]);
  const selW=resolveW(wallets,walletId),isCrd=selW?.isCredit;
  const handleW=(id)=>{const w=wallets.find(ww=>ww.id===id);setWalletId(id);if(w?.isCredit&&(payType==='pix_now'||payType==='pix_future'))setPayType('credit');if(!w?.isCredit&&(payType==='credit'||payType==='credit_inst'))setPayType('pix_now');};
  const targetM=computeTargetMonth(date,selW,payType),natM=dateToMonth(date),isDefer=(payType==='credit'||payType==='credit_inst')&&targetM!==natM;
  const payOpts=isCrd?[['credit','💳 Crédito'],['credit_inst','💳 Parcelado']]:[['pix_now','💸 PIX Agora'],['pix_future','📅 PIX Futuro']];
  const reset=()=>{setDesc('');setAmount('');setInst('');setTotInst('');setDueDate('');setNotes('');setReimbAmt('');setShowReim(false);};
  const submit=async()=>{
    if(!desc.trim()||!amount){setFlash({ok:false,msg:'Preencha descrição e valor'});return;}
    const val=parseFloat(String(amount).replace(',','.'));
    if(isNaN(val)||val<=0){setFlash({ok:false,msg:'Valor inválido'});return;}
    const rv=showReim&&reimbAmt?parseFloat(String(reimbAmt).replace(',','.'))||0:0;
    if(type==='income'){
      await onAddIncome({description:desc.trim(),amount:val,date,month:targetM,category:cat,notes});
      reset();setFlash({ok:true,msg:`✓ Receita em ${parseMonth(targetM)}`});setTimeout(()=>setFlash(null),2500);
    } else if(payType==='credit_inst'){
      const si=parseInt(inst)||1,ti=parseInt(totInst)||si,bm=computeTargetMonth(date,selW,payType),ne=[];
      for(let i=si;i<=ti;i++){ne.push({id:uid(),description:`${desc.trim()} ${i}/${ti}`,amount:val,date,month:shiftMonth(bm,i-si),wallet:walletId,category:cat,paymentType:payType,dueDate:null,notes,reembolso:i===si?rv:0,reembolsoDesc:''});}
      await onAddExpenses(ne);
      reset();
      const lm=shiftMonth(bm,ti-si);
      setFlash({ok:true,msg:`✓ ${ti-si+1} parcelas · ${parseMonth(bm)} → ${parseMonth(lm)}`});
      setTimeout(()=>setFlash(null),3500);
    } else {
      await onAddExpense({description:desc.trim(),amount:val,date,month:targetM,wallet:walletId,category:cat,paymentType:payType,dueDate:payType==='pix_future'?dueDate:null,notes,reembolso:rv,reembolsoDesc:rv>0?reimbWho:''});
      reset();setFlash({ok:true,msg:`✓ Lançado em ${parseMonth(targetM)}`});setTimeout(()=>setFlash(null),2500);
    }
  };
  return(
    <div style={{padding:'16px 20px 20px',fontFamily:"'DM Sans',system-ui,sans-serif"}}>
      <div style={{display:'flex',background:'rgba(255,255,255,0.04)',borderRadius:50,padding:4,gap:4,marginBottom:18}}>
        {[['expense','💸  Gasto'],['income','💰  Receita']].map(([v,l])=>(
          <button key={v} onClick={()=>setType(v)} style={{flex:1,border:'none',borderRadius:50,padding:'10px 0',cursor:'pointer',fontFamily:'inherit',fontWeight:700,fontSize:11,letterSpacing:'0.08em',textTransform:'uppercase',background:type===v?(v==='expense'?C.red:C.green):'transparent',color:type===v?'#fff':C.muted,transition:'all 0.2s'}}>{l}</button>
        ))}
      </div>
      {flash&&<div style={{background:flash.ok?'rgba(61,153,112,0.12)':'rgba(192,57,43,0.12)',border:`1px solid ${flash.ok?C.green:C.red}44`,borderRadius:12,padding:'11px 16px',marginBottom:16,color:flash.ok?C.green:C.red,fontWeight:700,textAlign:'center',fontSize:11,letterSpacing:'0.08em',textTransform:'uppercase'}}>{flash.msg}</div>}
      <div style={sCard}>
        <div style={{marginBottom:14}}><div style={sLbl}>Descrição *</div><input style={sInput} placeholder="Ex: NETFLIX, MILIUM, SALÁRIO..." value={desc} onChange={e=>setDesc(e.target.value)}/></div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
          <div><div style={sLbl}>Data</div><input type="date" style={sInput} value={date} onChange={e=>setDate(e.target.value)}/></div>
          <div><div style={sLbl}>Valor R$</div><input style={{...sInput,fontFamily:"'DM Mono',monospace"}} type="number" step="0.01" placeholder="0,00" value={amount} onChange={e=>setAmount(e.target.value)} inputMode="decimal"/></div>
        </div>
        {type==='expense'&&<>
          <div style={{marginBottom:14}}>
            <div style={sLbl}>Cartão / Carteira</div>
            <div style={{display:'flex',flexDirection:'column',gap:6}}>
              {wallets.map(w=>(
                <button key={w.id} onClick={()=>handleW(w.id)} style={{display:'flex',alignItems:'center',gap:10,padding:'11px 14px',border:`1px solid ${walletId===w.id?w.color:C.border}`,borderRadius:12,cursor:'pointer',background:walletId===w.id?`${w.color}10`:'transparent',fontFamily:'inherit',textAlign:'left',transition:'all 0.15s'}}>
                  <div style={{width:8,height:8,borderRadius:'50%',background:w.color,boxShadow:walletId===w.id?`0 0 8px ${w.color}88`:undefined}}/>
                  <span style={{flex:1,fontSize:13,fontWeight:600,color:walletId===w.id?w.color:C.muted}}>{w.label}</span>
                  {walletId===w.id&&w.closingDay>0&&<span style={{fontSize:10,color:C.muted}}>fecha dia {w.closingDay}</span>}
                  {walletId===w.id&&<span style={{color:w.color,fontSize:13}}>✓</span>}
                </button>
              ))}
            </div>
          </div>
          <div style={{marginBottom:14}}>
            <div style={sLbl}>Tipo de pagamento</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
              {payOpts.map(([v,l])=>(<button key={v} onClick={()=>setPayType(v)} style={{padding:'12px 4px',border:`1px solid ${payType===v?G:C.border}`,borderRadius:50,cursor:'pointer',fontFamily:'inherit',fontSize:12,fontWeight:700,letterSpacing:'0.04em',background:payType===v?C.gBg:'transparent',color:payType===v?G:C.muted,transition:'all 0.15s'}}>{l}</button>))}
            </div>
          </div>
          {payType==='credit_inst'&&(<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}><div><div style={sLbl}>Parcela atual</div><input style={sInput} type="number" min="1" placeholder="ex: 3" value={inst} onChange={e=>setInst(e.target.value)}/></div><div><div style={sLbl}>Total parcelas</div><input style={sInput} type="number" min="1" placeholder="ex: 10" value={totInst} onChange={e=>setTotInst(e.target.value)}/></div></div>)}
          {payType==='pix_future'&&(<div style={{marginBottom:14}}><div style={sLbl}>Data para pagar</div><input type="date" style={sInput} value={dueDate} onChange={e=>setDueDate(e.target.value)}/></div>)}
          {(payType==='credit'||payType==='credit_inst')&&!selW?.closingDay&&(
            <div style={{marginBottom:14,padding:'10px 14px',borderRadius:10,background:'rgba(200,168,75,0.07)',border:'1px solid rgba(200,168,75,0.2)'}}>
              <div style={{fontSize:11,fontWeight:700,color:G,letterSpacing:'0.04em'}}>⚙️ Configure o dia de fechamento</div>
              <div style={{fontSize:10,color:C.muted,marginTop:3}}>Vá em Config → selecione o cartão → defina o dia de fechamento para detectar a fatura correta automaticamente.</div>
            </div>
          )}
          {(payType==='credit'||payType==='credit_inst')&&selW?.closingDay>0&&(
            <div style={{marginBottom:14,padding:'10px 14px',borderRadius:10,background:isDefer?'rgba(192,57,43,0.1)':'rgba(61,153,112,0.1)',border:`1px solid ${isDefer?C.red:C.green}33`}}>
              <div style={{fontSize:11,fontWeight:700,color:isDefer?C.red:C.green,letterSpacing:'0.06em',textTransform:'uppercase'}}>{isDefer?`⚠ Cai em ${parseMonth(targetM)}`:`✓ Fatura de ${parseMonth(targetM)}`}</div>
              {isDefer&&<div style={{fontSize:10,color:C.muted,marginTop:3}}>Dia {date.split('-')[2]} › fechamento dia {selW.closingDay}</div>}
            </div>
          )}
          <div style={{marginBottom:14}}>
            <button onClick={()=>setShowReim(!showReim)} style={{...oBtn,fontSize:11,padding:'8px 16px',width:'auto'}}>{showReim?'▲':'+'} Reembolso / Estorno</button>
            {showReim&&(
              <div style={{marginTop:10,padding:'14px',background:C.gBg,borderRadius:12,border:`1px solid ${C.gBorder}`}}>
                <div style={{fontSize:9,color:G,fontWeight:700,letterSpacing:'0.12em',textTransform:'uppercase',marginBottom:12}}>Parte reembolsada</div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
                  <div><div style={sLbl}>Valor R$</div><input style={sInput} type="number" step="0.01" placeholder="12,00" value={reimbAmt} onChange={e=>setReimbAmt(e.target.value)} inputMode="decimal"/></div>
                  <div><div style={sLbl}>Quem paga</div><input style={sInput} placeholder="Mariana" value={reimbWho} onChange={e=>setReimbWho(e.target.value)}/></div>
                </div>
                {amount&&reimbAmt&&(()=>{const a=parseFloat(String(amount).replace(',','.'))||0,r=parseFloat(String(reimbAmt).replace(',','.'))||0;return a>0&&r>0?<div style={{fontSize:11,color:C.muted}}>Custo líquido: <span style={{color:G,fontFamily:"'DM Mono',monospace"}}>{fmt(Math.max(a-r,0))}</span></div>:null;})()}
              </div>
            )}
          </div>
        </>}
        <div style={{marginBottom:14}}>
          <div style={sLbl}>Categoria</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
            {CATEGORIES.map(c=>(<button key={c} onClick={()=>setCat(c)} style={{padding:'6px 12px',border:`1px solid ${cat===c?G:C.border}`,borderRadius:50,cursor:'pointer',fontFamily:'inherit',fontSize:11,fontWeight:600,background:cat===c?C.gBg:'transparent',color:cat===c?G:C.muted,transition:'all 0.15s'}}>{c}</button>))}
          </div>
        </div>
        <div style={{marginBottom:18}}><div style={sLbl}>Obs. (opcional)</div><input style={sInput} placeholder="Anotação..." value={notes} onChange={e=>setNotes(e.target.value)}/></div>
        <button onClick={submit} style={pBtn(type==='income'?C.green:GG,type==='income'?'#fff':'#070707')}>+ {type==='income'?'Registrar Receita':'Registrar Gasto'}</button>
      </div>
    </div>
  );
}

              <span style={{fontFamily:"'DM Mono',monospace",fontSize:14,fontWeight:500,color:w.color}}>{fmt(we.reduce((s,e)=>s+netAmt(e),0))}</span>

                <div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:500,color:C.text,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{e.description}</div><div style={{fontSize:10,color:C.muted,marginTop:2}}>{fmtDate(e.date)} · {e.category}{e.reembolso?<span style={{color:G}}> · reimb. {fmt(e.reembolso)}</span>:null}</div></div>
                <div style={{fontFamily:"'DM Mono',monospace",fontSize:13,fontWeight:500,color:C.text,marginLeft:10}}>{fmt(netAmt(e))}</div>
              </div>
            ))}
          </div>
        );
      })}
      {incomes.length>0&&(
        <div style={{...sCard,padding:0,overflow:'hidden'}}>
          <div style={{display:'flex',justifyContent:'space-between',padding:'12px 16px',borderBottom:`1px solid ${C.border}`}}><span style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:11,color:C.green,letterSpacing:'0.1em',textTransform:'uppercase'}}>💰 Receitas</span><span style={{fontFamily:"'DM Mono',monospace",fontSize:14,color:C.green}}>{fmt(recs)}</span></div>
          {incomes.map((i,idx,arr)=>(<div key={i.id} style={{display:'flex',justifyContent:'space-between',padding:'10px 16px',borderBottom:idx<arr.length-1?`1px solid ${C.border}`:'none'}}><div><div style={{fontSize:13,color:C.text}}>{i.description}</div><div style={{fontSize:10,color:C.muted,marginTop:2}}>{fmtDate(i.date)} · {i.category}</div></div><span style={{fontFamily:"'DM Mono',monospace",fontSize:13,color:C.green}}>{fmt(i.amount)}</span></div>))}
        </div>
      )}
      {!expenses.length&&!incomes.length&&<div style={{textAlign:'center',padding:'48px 20px'}}><div style={{fontFamily:"'Syne',sans-serif",fontSize:12,color:C.muted,letterSpacing:'0.12em',textTransform:'uppercase'}}>Nenhum lançamento</div></div>}
    </div>

            <div style={{marginBottom:10}}><div style={sLbl}>Cor</div><div style={{display:'flex',gap:8,flexWrap:'wrap'}}>{CARD_COLORS.map(c=><button key={c} onClick={()=>setNewColor(c)} style={{width:28,height:28,borderRadius:'50%',background:c,border:`3px solid ${newColor===c?'#fff':'transparent'}`,cursor:'pointer'}}/>)}</div></div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:10}}>
              <div><div style={sLbl}>Tipo</div><div style={{display:'flex',gap:6}}>{[[true,'💳 Crédito'],[false,'💸 PIX']].map(([v,l])=>(<button key={String(v)} onClick={()=>setNewCredit(v)} style={{flex:1,padding:'9px 4px',border:`1px solid ${newCredit===v?G:C.border}`,borderRadius:50,cursor:'pointer',fontFamily:'inherit',fontSize:11,fontWeight:700,background:newCredit===v?C.gBg:'transparent',color:newCredit===v?G:C.muted}}>{l}</button>))}</div></div>
              {newCredit&&<div><div style={sLbl}>Fecha dia</div><input type="number" min="1" max="31" placeholder="ex: 10" value={newClosing} onChange={e=>setNewClosing(e.target.value)} style={{...sInput,fontFamily:"'DM Mono',monospace"}}/></div>}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}><button onClick={()=>{setAdding(false);setNewName('');setNewClosing('');}} style={oBtn}>Cancelar</button><button onClick={addCard} style={pBtn(GG)}>Adicionar</button></div>
          </div>
        )}
        <button onClick={()=>onSaveWallets(local)} style={{...pBtn(GG),marginBottom:10}}>✓ Salvar</button>
        <button onClick={onLogout} style={oBtn}>Trocar usuário / Sair</button>
      </div>
    </div>
  );
}

function ExportModal({user,expenses,incomes,month,wallets,onClose}){
  const[copied,setCopied]=useState(false);
  const text=buildWA(user,expenses,incomes,month,wallets);
  const copy=async()=>{try{await navigator.clipboard.writeText(text);setCopied(true);setTimeout(()=>setCopied(false),2000);}catch{}};
  const openPDF=()=>{window.open(URL.createObjectURL(new Blob([buildPDF(user,expenses,incomes,month,wallets)],{type:'text/html'})),'_blank');};
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.85)',display:'flex',alignItems:'flex-end',zIndex:200}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{width:'100%',maxWidth:480,margin:'0 auto',background:C.modal,borderRadius:'22px 22px 0 0',padding:22,borderTop:`1px solid ${C.gBorder}`,fontFamily:"'DM Sans',system-ui,sans-serif"}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <span style={{fontFamily:"'Syne',sans-serif",fontSize:14,fontWeight:700,color:G,letterSpacing:'0.14em',textTransform:'uppercase'}}>Exportar</span>
          <button onClick={onClose} style={{background:'rgba(255,255,255,0.06)',border:'none',color:C.muted,cursor:'pointer',borderRadius:50,width:32,height:32,fontSize:16}}>✕</button>
        </div>
        <div style={sLbl}>Texto para WhatsApp</div>
        <textarea readOnly value={text} style={{...sInput,height:180,resize:'none',fontSize:11,fontFamily:"'DM Mono',monospace",lineHeight:1.7,marginBottom:12}}/>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:10}}>
          <button onClick={copy} style={{...pBtn(copied?C.green:'rgba(255,255,255,0.07)',copied?'#fff':C.muted),fontSize:12}}>{copied?'✓ Copiado':'📋 Copiar'}</button>
          <button onClick={openPDF} style={{...pBtn(GG),fontSize:12}}>🖨️ PDF</button>
        </div>
        <div style={{fontSize:9,color:C.dim,textAlign:'center',letterSpacing:'0.06em',textTransform:'uppercase'}}>PDF → Ctrl+P / ⌘+P para salvar</div>
      </div>
    </div>
  );
}

function NI({id,icon,label,tab,setTab}){
  const a=tab===id;
  return(<button onClick={()=>setTab(id)} style={{flex:1,border:'none',background:'transparent',cursor:'pointer',fontFamily:'inherit',padding:'6px 0 0',display:'flex',flexDirection:'column',alignItems:'center',gap:3}}><span style={{fontSize:19,opacity:a?1:0.28,transition:'opacity 0.15s'}}>{icon}</span><span style={{fontSize:8,fontWeight:700,letterSpacing:'0.1em',textTransform:'uppercase',color:a?G:C.dim,fontFamily:"'DM Sans',system-ui,sans-serif"}}>{label}</span></button>);
}

function BottomNav({tab,setTab,onSettings}){
  return(
    <div style={{flexShrink:0,position:'relative',background:'#0A0A0A',borderTop:'1px solid rgba(200,168,75,0.1)',display:'flex',alignItems:'center',padding:'10px 0 18px',overflow:'visible'}}>
      <button onClick={()=>setTab('add')} style={{position:'absolute',top:-26,left:'50%',width:52,height:52,borderRadius:'50%',background:GG,boxShadow:'0 -4px 28px rgba(200,168,75,0.5)',border:'2px solid rgba(0,0,0,0.2)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:26,fontWeight:900,color:'#070707',zIndex:10,transform:`translateX(-50%) scale(${tab==='add'?1.1:1})`,transition:'transform 0.15s ease',fontFamily:'system-ui'}}>+</button>
      <NI id="dashboard" icon="🏠" label="Início" tab={tab} setTab={setTab}/>
      <NI id="reports" icon="📊" label="Relatório" tab={tab} setTab={setTab}/>
      <div style={{flex:1}}/>
      <NI id="history" icon="📋" label="Histórico" tab={tab} setTab={setTab}/>
      <button onClick={onSettings} style={{flex:1,border:'none',background:'transparent',cursor:'pointer',fontFamily:'inherit',padding:'6px 0 0',display:'flex',flexDirection:'column',alignItems:'center',gap:3}}><span style={{fontSize:19,opacity:0.28}}>⚙️</span><span style={{fontSize:8,fontWeight:700,letterSpacing:'0.1em',textTransform:'uppercase',color:C.dim,fontFamily:"'DM Sans',system-ui,sans-serif"}}>Config</span></button>
    </div>
  );
}

function App(){
  const[ready,setReady]=useState(false);
  const[loggedIn,setLoggedIn]=useState(false);
  const[user,setUser]=useState('gabriel');
  const[tab,setTab]=useState('dashboard');
  const[month,setMonth]=useState(getMonthKey);
  const[expenses,setExpenses]=useState([]);
  const[incomes,setIncomes]=useState([]);
  const[allWallets,setAllWallets]=useState({gabriel:[],mariana:[]});
  const[showSettings,setShowSettings]=useState(false);
  const[showExport,setShowExport]=useState(false);

  useEffect(()=>{
    (async()=>{
      const[e,i,w,s]=await Promise.all([stGet('fin_expenses'),stGet('fin_incomes'),stGet('fin_wallets'),stGet('fin_session')]);
      setExpenses(Array.isArray(e)?e:[]);
      setIncomes(Array.isArray(i)?i:[]);
      setAllWallets(w?.gabriel&&w?.mariana?w:JSON.parse(JSON.stringify(DEFAULT_WALLETS)));
      if(s?.loggedIn&&s?.user){setUser(s.user);setLoggedIn(true);}
      setReady(true);
    })();
  },[]);

  const handleLogin=async(u)=>{setUser(u);setLoggedIn(true);await stSet('fin_session',{loggedIn:true,user:u});};
  const handleLogout=async()=>{setLoggedIn(false);setShowSettings(false);await stSet('fin_session',{loggedIn:false,user:null});};
  const saveWallets=async(nw)=>{const up={...allWallets,[user]:nw};setAllWallets(up);await stSet('fin_wallets',up);setShowSettings(false);};
  const addExpense=async(exp)=>{const l=[...expenses,{...exp,id:uid(),user}];setExpenses(l);await stSet('fin_expenses',l);};
  const addExpenses=async(exps)=>{const l=[...expenses,...exps.map(e=>({...e,user}))];setExpenses(l);await stSet('fin_expenses',l);};
  const deleteExpense=async(id)=>{const l=expenses.filter(e=>e.id!==id);setExpenses(l);await stSet('fin_expenses',l);};
  const addIncome=async(inc)=>{const l=[...incomes,{...inc,id:uid(),user}];setIncomes(l);await stSet('fin_incomes',l);};
  const deleteIncome=async(id)=>{const l=incomes.filter(i=>i.id!==id);setIncomes(l);await stSet('fin_incomes',l);};

  const wallets=allWallets[user]?.length?allWallets[user]:DEFAULT_WALLETS[user];
  const uExp=expenses.filter(e=>e.user===user&&e.month===month);
  const uInc=incomes.filter(i=>i.user===user&&i.month===month);

  if(!ready)return(<div style={{height:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:C.bg,gap:14}}><div style={{fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:800,color:G,letterSpacing:'0.2em',textTransform:'uppercase'}}>Finanças</div><div style={{width:36,height:1,background:GG,borderRadius:1}}/></div>);
  if(!loggedIn)return <LoginScreen onLogin={handleLogin}/>;
  return(
    <div style={{maxWidth:480,margin:'0 auto',height:'100vh',display:'flex',flexDirection:'column',background:C.bg,color:C.text,fontFamily:"'DM Sans',system-ui,sans-serif"}}>
      <Header user={user} month={month} setMonth={setMonth}/>
      <div style={{flex:1,overflowY:'auto'}}>
        {tab==='dashboard'&&<Dashboard expenses={uExp} incomes={uInc} wallets={wallets}/>}
        {tab==='add'&&<AddScreen user={user} wallets={wallets} onAddExpense={addExpense} onAddExpenses={addExpenses} onAddIncome={addIncome}/>}
        {tab==='reports'&&<ReportsScreen expenses={uExp} incomes={uInc} month={month} wallets={wallets} onExport={()=>setShowExport(true)}/>}
        {tab==='history'&&<HistoryScreen expenses={uExp} incomes={uInc} wallets={wallets} onDelete={deleteExpense} onDeleteIncome={deleteIncome}/>}
      </div>
      <BottomNav tab={tab} setTab={setTab} onSettings={()=>setShowSettings(true)}/>
      {showSettings&&<SettingsModal user={user} wallets={wallets} onSaveWallets={saveWallets} onLogout={handleLogout} onClose={()=>setShowSettings(false)}/>}
      {showExport&&<ExportModal user={user} expenses={uExp} incomes={uInc} month={month} wallets={wallets} onClose={()=>setShowExport(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
